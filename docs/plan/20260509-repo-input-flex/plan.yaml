plan_id: 20260509-repo-input-flex
objective: Add repository input support for GitHub URL or owner/repo with frontend and backend compatibility
created_at: 2026-05-09
created_by: gem-planner
status: pending
research_confidence: medium
plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 7
  risk_score: medium
tldr: |
  Implement a single repository input field in frontend, add robust parsing with English validation errors,
  extend POST /api/repos to accept repoInput while remaining backward compatible with owner/repo,
  add route-focused tests, and run full validation via pnpm test + tsc --noEmit.
open_questions: []
gaps: []
pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Frontend parser and backend parser normalize input differently, causing false invalid requests
      likelihood: medium
      impact: high
      mitigation: Define one request contract and add shared test cases for URL and owner/repo forms
    - scenario: Legacy clients break because backend prioritizes new field incorrectly
      likelihood: low
      impact: critical
      mitigation: Keep explicit fallback order and add regression tests for old owner/repo body payload
  assumptions:
    - Existing route handler for POST /api/repos is in src/index.tsx and can be safely extended
    - Existing test stack remains Vitest and is runnable by corepack pnpm test
implementation_specification:
  code_structure: Keep parsing logic centralized in backend route helpers and lightweight frontend validators; avoid duplicating regex rules in multiple components
  affected_areas:
    - src/dashboard.tsx
    - src/index.tsx
    - src/types.ts
    - src/__tests__/index.api-routes.test.ts
    - README.md
  component_details:
    - component: Frontend repository input
      responsibility: Provide a single input that accepts GitHub URL or owner/repo and shows English validation errors
      interfaces:
        - repoInput: string
        - validationError: string | null
      dependencies:
        - component: Backend POST /api/repos body contract
          relationship: submits parsed payload and consumes validation response
      integration_points:
        - src/dashboard.tsx
        - src/types.ts
    - component: Backend repository body resolver
      responsibility: Parse repoInput and remain compatible with legacy owner/repo payload
      interfaces:
        - POST /api/repos body: { repoInput?: string; owner?: string; repo?: string }
      dependencies:
        - component: Existing repository lookup/check logic
          relationship: forwards normalized owner/repo values
      integration_points:
        - src/index.tsx
        - src/__tests__/index.api-routes.test.ts
contracts:
  - from_task: T2
    to_task: T3
    interface: POST /api/repos request body compatibility
    format: JSON with repoInput preferred, fallback to owner+repo
  - from_task: T3
    to_task: T4
    interface: Route behavior matrix for valid/invalid/new/legacy body
    format: Vitest table-driven cases
  - from_task: T2
    to_task: T6
    interface: User-facing input formats and error messages
    format: README examples in English
