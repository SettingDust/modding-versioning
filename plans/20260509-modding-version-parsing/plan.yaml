risks_and_mitigations:
  - risk: Regex extensions may misdetect historical formats
    mitigation: Lock regression cases in 2e and run full-match tests
  - risk: Custom regex performance or safety risks (catastrophic backtracking)
    mitigation: Add length limits, execution timeout protection, or frontend validation prompts
  - risk: Inconsistent frontend-backend template pass-through fields
    mitigation: Unify types in src/types.ts and explicitly validate API inputs
  - risk: Single-field repository input may diverge from legacy owner/repo API callers
    mitigation: Preserve legacy owner/repo body compatibility and validate both request shapes in API tests

