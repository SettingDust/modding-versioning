name = "modding-versioning"
main = "src/index.tsx"
compatibility_date = "2024-11-01"

[[kv_namespaces]]
binding = "VERSION_CACHE"
id = "4fd2ad2ed5b04b48bb98b444ce43c153"

[vars]
# Sensitive values should be set via `wrangler secret put <NAME>` instead of here.
# These are listed here only as documentation of the expected environment variables.
#
# GITHUB_TOKEN       = ""  # GitHub PAT; bypasses 60 req/h anonymous rate limit
# CURSEFORGE_API_KEY = ""  # Required for CurseForge version queries
# ACCESS_TOKEN       = ""  # Shared secret to protect write operations (POST/DELETE /api/repos)
#                          # If unset, write operations are open to everyone.
# PARSE_REQUIRES_AUTH = "" # Set to "true" to require ACCESS_TOKEN on /api/parse and /api/check

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1